apiVersion: v1
kind: Pod
metadata:
  labels:
    run: giropops
  name: giropops
spec:
  containers:
  - image: nginx
    name: webserver
    volumeMounts: 
    - mountPath: /giropops
      name: primeiro-vol
    resources:
      limits:
        cpu: "1"
        memory: "128Mi"
      requests:
        cpu: "0.5"
        memory: "64Mi"
  volumes: 
  - name: primeiro-vol
    emptyDir:
      sizeLimit: 256M
  dnsPolicy: ClusterFirst
  restartPolicy: Always
